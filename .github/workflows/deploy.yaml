name: CI/CD pipeline

on:
  push:
    branches:
      - dev

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push API Images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/Dockerfile.api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/dota2metalab-api:${{ github.sha }}
      - name: Build and Push Trainer Images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/Dockerfile.trainer
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/dota2metalab-trainer:${{ github.sha }}
      - name: Build and Push Fetcher Images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/Dockerfile.trainer
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/dota2metalab-fetcher:${{ github.sha }}
  deploy-dev:
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to dev
        run: |
          ./cli/deploy.sh ${{ github.sha }} dev