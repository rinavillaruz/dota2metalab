apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dota2-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://github.com/rinavillaruz/dota2metalab
      targetRevision: dev
      path: deploy/helm
      helm:
        valueFiles:
          - values.yaml
          - $env_dev/deploy/helm/values-dev.yaml
    - repoURL: https://github.com/rinavillaruz/dota2metalab
      targetRevision: env/dev
      ref: env_dev 

  destination:
    server: https://kubernetes.default.svc
    namespace: dota2metalab-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m