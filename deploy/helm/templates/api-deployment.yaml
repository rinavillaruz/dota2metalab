apiVersion: apps/v1
kind: Deployment
metadata:
  name: dota2metalab-api
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: dota2metalab-api
  template:
    metadata:
      annotations:
        rollme: {{ randAlphaNum 5 | quote }}
      labels:
        app: dota2metalab-api
    spec:
      containers:
        - name: api
          image: {{ .Values.image.repository }}-api:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            - name: MONGO_URI
              value: mongodb://mongodb:{{ .Values.mongodb.port }}
            - name: PYTHONPATH
              value: /app
            - name: MODEL_DIR
              value: /app/models
          volumeMounts:
            - mountPath: /app/models
              name: models-storage
      volumes:
        - name: models-storage
          persistentVolumeClaim:
            claimName: models-pvc