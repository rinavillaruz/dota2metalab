apiVersion: batch/v1
kind: Job
metadata:
  name: dota2metalab-fetcher
  namespace: {{ .Values.global.namespace }}
spec:
  backoffLimit: 3 #defaults to 6
  template:
    spec:
      containers:
        - name: fetcher
          image: {{ .Values.image.repository }}-fetcher:{{ .Values.image.tag }}
          command: ["python", "scripts/store_database.py"]
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: MONGO_URI
              value: mongodb://mongodb:{{ .Values.mongodb.port }}
            - name: PYTHONPATH
              value: /app
      restartPolicy: Never