apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: models-pvc
  namespace: {{ .Values.global.namespace }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.models.persistence.size }}
  storageClassName: {{ .Values.models.persistence.storageClassName }}
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: {{ .Values.models.persistence.size }}